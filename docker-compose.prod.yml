# ChoreQuest Production Docker Compose
# Deploys ChoreQuest app only - requires external Supabase instance
#
# Usage: docker compose --env-file .env.production -f docker-compose.prod.yml up -d
#
# Prerequisites:
# 1. Supabase instance running (local CLI, hosted, or self-hosted Docker)
# 2. .env.production configured with Supabase credentials

services:
  # ChoreQuest Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    container_name: chorequest-app
    ports:
      # Set APP_HOST_BIND to an address plus trailing colon (for example
      # 10.10.50.2:) when production should bind the host port to one
      # interface instead of all interfaces.
      - "${APP_HOST_BIND:-}${PORT:-3000}:3000"
    environment:
      # Supabase Configuration (from external instance)
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      # Internal server-side URL (for Docker-to-Docker communication)
      - SUPABASE_INTERNAL_URL=${SUPABASE_INTERNAL_URL:-https://supabase.example.com}
      - SUPABASE_URL=${SUPABASE_URL:-https://supabase.example.com}
      # Cron + auth configuration
      - NEXTAUTH_URL=${NEXTAUTH_URL:-https://app.example.com}
      - CRON_SECRET=${CRON_SECRET}
      - HOSTNAME=${HOSTNAME_OVERRIDE:-0.0.0.0}
      - HOST=0.0.0.0
      # Database bootstrap toggle
      - ENABLE_DB_BOOTSTRAP=${ENABLE_DB_BOOTSTRAP:-false}
      # Direct Postgres credentials for startup migrations.
      # This is separate from Supabase HTTP/API traffic and must use the
      # database container's internal port on the shared Docker network.
      - DB_HOST=${DIRECT_DB_HOST:-supabase-db}
      - DB_PORT=${DIRECT_DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-postgres}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD}

      # Application Configuration
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - PORT=3000
      # Recurring quest test interval (optional, for testing)
      - RECURRING_TEST_INTERVAL_MINUTES=${RECURRING_TEST_INTERVAL_MINUTES:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s
    networks:
      - chorequest
      - supabase_default
    extra_hosts:
      - "host.docker.internal:host-gateway"

# Network Configuration
networks:
  chorequest:
    driver: bridge
    name: chorequest_network
  supabase_default:
    external: true
    name: supabase_default
